<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>SBTI 统计面板</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f3;
      --card: rgba(255, 255, 255, 0.92);
      --line: rgba(83, 107, 88, 0.14);
      --text: #18261c;
      --muted: #5d6e62;
      --accent: #6f8f72;
      --accent-strong: #446149;
      --shadow: 0 18px 40px rgba(39, 57, 44, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(171, 199, 176, 0.28), transparent 34%),
        linear-gradient(180deg, #f7fbf7, var(--bg));
    }

    .shell {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    .hero,
    .card {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      display: grid;
      gap: 18px;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      width: fit-content;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(111, 143, 114, 0.12);
      color: var(--accent-strong);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 6vw, 44px);
      line-height: 1.05;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
      max-width: 720px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .toolbar input {
      flex: 1 1 280px;
      min-height: 46px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      font: inherit;
    }

    .toolbar button {
      min-height: 46px;
      padding: 0 16px;
      border: 0;
      border-radius: 14px;
      background: var(--accent-strong);
      color: #fff;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .toolbar .secondary {
      background: #eef5ef;
      color: var(--accent-strong);
      border: 1px solid var(--line);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .meta span {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.84);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-card {
      padding: 18px;
    }

    .summary-card .label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .summary-card .value {
      margin-top: 10px;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 800;
      line-height: 1;
    }

    .panel {
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .empty {
      padding: 18px;
      border-radius: 18px;
      border: 1px dashed var(--line);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.7);
    }

    .table {
      margin-top: 18px;
      display: grid;
      gap: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(120px, 180px) minmax(0, 1fr) 80px 80px;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.76);
    }

    .type {
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    .bar {
      height: 12px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(111, 143, 114, 0.12);
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
    }

    .count,
    .percentage {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .versions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .versions span {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.84);
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 860px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .row {
        grid-template-columns: 1fr;
      }

      .count,
      .percentage {
        text-align: left;
      }
    }

    @media (max-width: 560px) {
      .shell {
        width: min(100% - 20px, 100%);
        padding-top: 20px;
      }

      .hero,
      .panel,
      .summary-card {
        padding: 16px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">SBTI Analytics</div>
      <h1>人格占比统计</h1>
      <p class="sub">这里统计的是每个 `anonymousId` 当前最新一次结果，所以口径是“当前设备分布”，不是历史答题总次数。</p>
      <div class="toolbar">
        <input id="versionInput" type="text" placeholder="可选：按 version 过滤，例如 sbti-web-v1" />
        <button id="refreshBtn" type="button">刷新统计</button>
        <button id="clearBtn" class="secondary" type="button">清空过滤</button>
      </div>
      <div class="meta">
        <span id="updatedAt">数据更新时间：--</span>
        <span id="generatedAt">本页生成时间：--</span>
      </div>
    </section>

    <section class="summary-grid">
      <article class="card summary-card">
        <div class="label">去重后设备数</div>
        <div id="totalUsers" class="value">0</div>
      </article>
      <article class="card summary-card">
        <div class="label">普通人格</div>
        <div id="normalUsers" class="value">0</div>
      </article>
      <article class="card summary-card">
        <div class="label">特殊人格</div>
        <div id="specialUsers" class="value">0</div>
      </article>
      <article class="card summary-card">
        <div class="label">已命中人格种类</div>
        <div id="typeCount" class="value">0</div>
      </article>
    </section>

    <section class="card panel">
      <h2>人格分布</h2>
      <div id="status" class="status">正在加载统计...</div>
      <div id="table" class="table" hidden></div>
      <div id="empty" class="empty" hidden>还没有可用统计数据，先去前台提交几次结果再回来刷新。</div>
      <div id="versions" class="versions"></div>
    </section>
  </main>

  <script>
    const versionInput = document.getElementById('versionInput');
    const refreshBtn = document.getElementById('refreshBtn');
    const clearBtn = document.getElementById('clearBtn');
    const updatedAtEl = document.getElementById('updatedAt');
    const generatedAtEl = document.getElementById('generatedAt');
    const totalUsersEl = document.getElementById('totalUsers');
    const normalUsersEl = document.getElementById('normalUsers');
    const specialUsersEl = document.getElementById('specialUsers');
    const typeCountEl = document.getElementById('typeCount');
    const statusEl = document.getElementById('status');
    const tableEl = document.getElementById('table');
    const emptyEl = document.getElementById('empty');
    const versionsEl = document.getElementById('versions');

    function formatDateTime(value) {
      if (!value) return '--';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '--';
      return new Intl.DateTimeFormat('zh-CN', {
        dateStyle: 'medium',
        timeStyle: 'medium'
      }).format(date);
    }

    function buildStatsUrl() {
      const url = new URL('/api/stats', window.location.origin);
      const version = versionInput.value.trim();
      if (version) {
        url.searchParams.set('version', version);
      }
      return url;
    }

    function renderVersions(versions = []) {
      versionsEl.innerHTML = versions.map((item) => (
        `<span>${item.version} · ${item.count} 台设备</span>`
      )).join('');
    }

    function renderTypes(types = []) {
      tableEl.innerHTML = types.map((item) => `
        <div class="row">
          <div class="type">${item.finalType}</div>
          <div class="bar"><span style="width:${Math.max(item.percentage, 2)}%"></span></div>
          <div class="count">${item.count}</div>
          <div class="percentage">${item.percentage}%</div>
        </div>
      `).join('');
    }

    async function loadStats() {
      statusEl.textContent = '正在加载统计...';
      tableEl.hidden = true;
      emptyEl.hidden = true;

      try {
        const response = await fetch(buildStatsUrl(), {
          headers: {
            'Accept': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        totalUsersEl.textContent = data.totalUsers ?? 0;
        normalUsersEl.textContent = data.normalUsers ?? 0;
        specialUsersEl.textContent = data.specialUsers ?? 0;
        typeCountEl.textContent = data.typeCount ?? 0;
        updatedAtEl.textContent = `数据更新时间：${formatDateTime(data.updatedAt)}`;
        generatedAtEl.textContent = `本页生成时间：${formatDateTime(data.generatedAt)}`;
        renderVersions(data.versions || []);

        if (!data.types || data.types.length === 0) {
          statusEl.textContent = '当前还没有可统计的结果。';
          emptyEl.hidden = false;
          return;
        }

        const scopeText = data.versionFilter
          ? `当前只看版本 ${data.versionFilter} 的去重结果。`
          : '当前统计的是全部版本的去重结果。';
        statusEl.textContent = `${scopeText} 表格里的百分比是按当前筛选范围计算的。`;
        renderTypes(data.types);
        tableEl.hidden = false;
      } catch (error) {
        console.error(error);
        statusEl.textContent = '统计加载失败了，请确认后端服务和 /api/stats 是否正常。';
      }
    }

    refreshBtn.addEventListener('click', loadStats);
    clearBtn.addEventListener('click', () => {
      versionInput.value = '';
      loadStats();
    });

    versionInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        loadStats();
      }
    });

    loadStats();
  </script>
</body>
</html>
